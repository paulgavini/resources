<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Draw Editor</title>
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <div class="app-shell">
    <main id="workspace" class="workspace">
      <div class="stage-shell">
        <div id="emptyState" class="empty-state">
          <p class="empty-eyebrow">PDF Editor</p>
          <h2>Drop a PDF or use Open PDF</h2>
          <p>Draw directly on the page, erase marks, then save an annotated copy.</p>
        </div>

        <div id="viewerShell" class="viewer-shell hidden">
          <div class="canvas-frame">
            <div class="canvas-stage">
              <canvas id="pdfCanvas"></canvas>
              <canvas id="drawCanvas"></canvas>
              <img id="penCursor" src="cursor-arrow-lime.svg" alt="" aria-hidden="true">
            </div>
          </div>
        </div>
      </div>
    </main>

    <aside class="control-panel">
      <div class="control-rail">
        <div class="swatch-stack" aria-label="Brush colours">
          <button class="swatch-button active" type="button" data-color="#2d4f83" aria-label="Blue ink"></button>
          <button class="swatch-button" type="button" data-color="#8bff2f" aria-label="Green ink"></button>
          <button class="swatch-button" type="button" data-color="#ff1021" aria-label="Red ink"></button>
        </div>

        <input id="pdfInput" class="visually-hidden" type="file" accept="application/pdf">
        <input id="colorPicker" class="visually-hidden" type="color" value="#2d4f83">

        <label class="tool-button file-button" for="pdfInput">Open PDF</label>
        <button id="eraseModeBtn" class="tool-button" type="button">Eraser</button>
        <button id="undoBtn" class="tool-button" type="button" disabled>Undo</button>
        <button id="redoBtn" class="tool-button" type="button" disabled>Redo</button>
        <button id="clearPageBtn" class="tool-button" type="button">Clear</button>
        <button id="zoomOutBtn" class="tool-button icon-button" type="button" aria-label="Zoom out">-</button>
        <button id="zoomInBtn" class="tool-button icon-button" type="button" aria-label="Zoom in">+</button>
        <button id="fullscreenBtn" class="tool-button" type="button">Full Screen</button>
        <button id="downloadBtn" class="tool-button" type="button" disabled>Export PDF</button>
        <button id="prevPageBtn" class="tool-button" type="button" disabled>Previous</button>
        <button id="nextPageBtn" class="tool-button" type="button" disabled>Next</button>

        <div class="page-pill">
          <span id="pageIndicator">0 / 0</span>
        </div>

        <div class="slider-block">
          <div class="slider-labels">
            <span>Brush</span>
            <span id="brushSizeValue">4 px</span>
          </div>
          <input id="brushSize" type="range" min="1" max="24" value="4">
        </div>

        <p id="statusText" class="status-text">Select a PDF to begin.</p>
      </div>
    </aside>
  </div>

  <script src="vendor/pdf.min.js"></script>
  <script src="vendor/pdf-lib.min.js"></script>
  <script src="script.js?v=12"></script>
</body>
</html>
