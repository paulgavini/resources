<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylus Drawing Pad</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="drawing-layout">
      <section class="canvas-wrap">
        <canvas id="drawCanvas" aria-label="Drawing canvas"></canvas>
        <img id="penCursor" src="pen-cursor.svg" alt="" aria-hidden="true">
      </section>
      <aside class="control-panel" aria-label="Drawing controls">
        <div class="ink-colors" aria-label="Ink colors">
          <button class="color-btn is-selected" data-color="#1f3d66" title="Default ink" aria-label="Default ink" type="button"></button>
          <button class="color-btn" data-color="#7cff00" title="Green ink" aria-label="Green ink" type="button"></button>
          <button class="color-btn" data-color="#ff0000" title="Red ink" aria-label="Red ink" type="button"></button>
        </div>
        <button id="eraseBtn" class="tool-btn" type="button">Eraser</button>
        <button id="fullScreenBtn" class="tool-btn" type="button">Full Screen</button>
        <button id="clearBtn" class="tool-btn" type="button">Clear</button>
        <button id="saveBtn" class="tool-btn" type="button">Save Image</button>
      </aside>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
