<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stylus Drawing Pad</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="drawing-layout">
      <section class="canvas-wrap">
        <canvas id="drawCanvas" aria-label="Drawing canvas"></canvas>
        <img id="penCursor" src="pen-cursor.svg" alt="" aria-hidden="true">
        <div id="pasteOverlay" class="paste-overlay" aria-hidden="true">
          <img id="pasteOverlayImage" alt="" aria-hidden="true">
          <div id="pasteResizeHandle" class="paste-resize-handle" aria-hidden="true"></div>
        </div>
      </section>
      <aside class="control-panel" aria-label="Drawing controls">
        <div class="ink-colors" aria-label="Ink colors">
          <button class="color-btn is-selected" data-color="#1f3d66" title="Default ink" aria-label="Default ink" type="button"></button>
          <button class="color-btn" data-color="#7cff00" title="Green ink" aria-label="Green ink" type="button"></button>
          <button class="color-btn" data-color="#ff0000" title="Red ink" aria-label="Red ink" type="button"></button>
        </div>
        <button id="eraseBtn" class="tool-btn" type="button">Eraser</button>
        <button id="undoBtn" class="tool-btn" type="button">Undo</button>
        <button id="gridBtn" class="tool-btn" type="button">1cm Grid</button>
        <button id="pasteBtn" class="tool-btn" type="button">Paste</button>
        <button id="fullScreenBtn" class="tool-btn" type="button">Full Screen</button>
        <button id="clearBtn" class="tool-btn" type="button">Clear</button>
        <button id="saveBtn" class="tool-btn" type="button">Export PDF</button>
        <button id="saveProjectBtn" class="tool-btn" type="button">Save Project</button>
        <button id="loadProjectBtn" class="tool-btn" type="button">Load Project</button>
        <input id="loadProjectInput" type="file" accept=".json,application/json" hidden>
        <button id="placeImageBtn" class="tool-btn" type="button" hidden>Place Image</button>
        <button id="cancelImageBtn" class="tool-btn" type="button" hidden>Cancel Image</button>
        <div class="page-controls" aria-label="Page controls">
          <button id="prevPageBtn" class="tool-btn" type="button">Prev</button>
          <span id="pageInfo" class="page-info" aria-live="polite">Page 1 of 1</span>
          <button id="nextPageBtn" class="tool-btn" type="button">Next</button>
          <button id="newPageBtn" class="tool-btn" type="button">New Page</button>
          <button id="deletePageBtn" class="tool-btn" type="button">Delete Page</button>
          <a class="help-link" href="help.html" target="_blank" rel="noopener noreferrer">Help</a>
        </div>
      </aside>
    </section>
    <p id="status" class="status">Waiting for stylus input...</p>
  </main>
  <script src="script.js"></script>
</body>
</html>
