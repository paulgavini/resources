<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taylors' laser-cut maze maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="app-header">
      <div>
        <h1>Taylors' laser-cut maze maker</h1>
        <p id="specSummary">90 mm x 90 mm, 18 x 18 grid, offline SVG and PDF export.</p>
      </div>
      <div class="header-actions">
        <div class="project-credit">
          <a href="https://www.youtube.com/@paulgavini" target="_blank" rel="noopener noreferrer">By Paul Gavini using CODEX</a>
          <a href="https://paulgavini.github.io/resources/" target="_blank" rel="noopener noreferrer">Home</a>
        </div>
        <div id="specBadge" class="spec-badge" aria-label="Design size">90 mm x 90 mm</div>
      </div>
    </header>

    <section class="workspace" aria-label="Maze workspace">
      <div class="preview-panel">
        <div class="preview-toolbar">
          <div>
            <strong id="modeLabel">Generated maze</strong>
            <span id="mazeSummary">Ready</span>
          </div>
          <button id="designerModeBtn" type="button">Designer Mode</button>
        </div>
        <svg id="mazePreview" viewBox="0 0 90 90" role="img" aria-label="Maze preview"></svg>
      </div>

      <aside class="controls" aria-label="Controls">
        <section>
          <h2>Create</h2>
          <div class="button-row">
            <button id="generateBtn" type="button">Auto-generate maze</button>
            <button id="clearBtn" type="button">Clear</button>
          </div>
          <div class="button-row">
            <button id="undoBtn" type="button">Undo</button>
            <label class="check-row">
              <input id="branchMode" type="checkbox">
              <span>Branch Mode</span>
            </label>
          </div>
        </section>

        <section>
          <h2>Dimensions</h2>
          <label class="field">
            <span>Base width (mm)</span>
            <input id="baseWidth" type="number" min="20" max="300" step="1" value="90">
          </label>
          <label class="field">
            <span>Base height (mm)</span>
            <input id="baseHeight" type="number" min="20" max="300" step="1" value="90">
          </label>
          <label class="field">
            <span>Path width (mm)</span>
            <input id="pathWidth" type="number" min="2" max="20" step="0.5" value="5">
          </label>
          <button id="applyDimensionsBtn" type="button">Apply dimensions</button>
        </section>

        <section>
          <h2>Export settings</h2>
          <label class="field">
            <span>Stroke width (mm)</span>
            <input id="strokeWidth" type="number" min="0.05" max="0.5" step="0.01" value="0.10">
          </label>
        </section>

        <section>
          <h2>Check and download</h2>
          <button id="validateBtn" type="button">Validate Design</button>
          <div class="button-grid">
            <button id="downloadSvgBtn" type="button">Download SVG</button>
            <button id="downloadPdfBtn" type="button">Download PDF</button>
          </div>
        </section>

        <section>
          <h2>Status</h2>
          <div id="status" class="status" aria-live="polite"></div>
        </section>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
